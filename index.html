<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Disaster Intelligence</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="style.css">

<style>

/* FLOAT ANIMATION */
@keyframes floatEarth {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-20px); }
}

.hidden-section {
  opacity: 0;
  transform: translateY(80px);
  transition: all 1s ease;
}

.show {
  opacity: 1;
  transform: translateY(0);
}

body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(0,255,255,0.08), transparent);
  z-index: -1;
}

#mapBox {
  height: 400px;
  width: 100%;
  margin-top: 20px;
  border-radius: 12px;
}

#earth3d {
  display: flex;
  justify-content: center;
  margin-top: 40px;
  cursor: grab;
}

#earth3d canvas {
  border-radius: 50%;
}

</style>
</head>

<body class="bg-gradient-to-br from-black via-slate-900 to-black text-white">

<!-- NAV -->
<nav class="flex justify-between px-8 py-5 bg-black/40 backdrop-blur-lg">
  <h1 class="text-2xl font-bold text-cyan-400">🌍 AI Disaster</h1>
</nav>

<!-- HERO -->
<section class="hidden-section text-center py-24">
  <h1 class="text-5xl font-bold mb-4">AI Disaster Intelligence</h1>
  <p class="text-gray-400">Real-time AI powered disaster prediction</p>

  <div class="flex justify-center mt-10">
    <div id="earth3d"></div>
  </div>
</section>

<!-- MAP -->
<section id="map" class="hidden-section px-10 text-center">

<button onclick="autoLocate()" 
class="px-6 py-3 bg-gradient-to-r from-cyan-400 to-indigo-500 rounded-xl shadow-lg hover:scale-110 transition">
📍 Detect My Location
</button>

<div class="mt-6 flex justify-center gap-3">
<input id="cityInput" placeholder="Enter city"
class="px-4 py-2 rounded-lg text-black">

<button onclick="searchCity()" 
class="px-4 py-2 bg-cyan-500 rounded-lg hover:scale-105">
🔍 Search
</button>
</div>

<p id="loading" class="mt-4 text-gray-400"></p>

<div id="resultBox" class="mt-6 bg-black/40 p-6 rounded-xl shadow-xl max-w-md mx-auto text-left">
  <p id="temp"></p>
  <p id="humidity"></p>
  <p id="rain"></p>
  <p id="river"></p>
  <p id="risk"></p>
  <p id="prediction"></p>
</div>

<div id="mapBox"></div>

</section>

<!-- CONTACT -->
<section class="hidden-section text-center py-16">
  <h2 class="text-2xl font-bold">Contact</h2>
  <p class="text-gray-400">ay630147@gmail.com</p>
</section>

<!-- SCROLL ANIMATION -->
<script>
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('show');
    }
  });
});

document.querySelectorAll(".hidden-section").forEach(el => {
  observer.observe(el);
});
</script>

<!-- ✅ CORRECT SCRIPT ORDER -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- 🔥 IMPORTANT: THREE JS FIRST -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<!-- 🔥 THEN YOUR SCRIPT -->
<script src="script.js"></script>

</body>
</html>
